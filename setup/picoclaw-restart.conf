# systemd drop-in: restart picoclaw automatically on crash or context-limit exit.
#
# Deploy on RPi:
#   mkdir -p ~/.config/systemd/user/picoclaw.service.d/
#   cp picoclaw-restart.conf ~/.config/systemd/user/picoclaw.service.d/restart.conf
#   systemctl --user daemon-reload
#   systemctl --user restart picoclaw
#
# Verify:
#   systemctl --user cat picoclaw.service   # should show Restart=always in the merged output

[Service]
Restart=always
RestartSec=5s
